name: 🚀 Deploy Automático para Vercel

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: ⚙️ Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Instalar dependências do projeto
        run: npm install

      - name: 🔧 Build e Minificar
        run: npm run build
      
      - name: 📋 Verificar ficheiros gerados
        run: ls -la dist/

      - name: ⬆️ Instalar Vercel CLI mais recente
        run: npm install -g vercel@latest

      - name: 🚀 Fazer Deploy para Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
