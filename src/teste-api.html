<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste API - NotaAlta</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #2563eb;
        }
        #resultado {
            margin-top: 20px;
            padding: 20px;
            background: #0f172a;
            border-radius: 8px;
            font-family: monospace;
            text-align: left;
            min-height: 50px;
        }
        .sucesso {
            color: #4ade80;
        }
        .erro {
            color: #f87171;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Teste de Conexão</h1>
        <p>Frontend (Vercel) → Backend (Render)</p>
        
        <button onclick="testarAPI()">🔗 Testar API</button>
        
        <div id="resultado">
            Clique no botão para testar...
        </div>
    </div>

    <script>
        async function testarAPI() {
            const resultado = document.getElementById("resultado");
            resultado.innerHTML = "⏳ Conectando...";
            
            try {
                const response = await fetch("https://notaalta-api.onrender.com/");
                const data = await response.json();
                
                resultado.innerHTML = `
                    <span class="sucesso">✅ Conexão bem-sucedida!</span><br><br>
                    <strong>Resposta da API:</strong><br>
                    ${JSON.stringify(data, null, 2)}
                `;
            } catch (erro) {
                resultado.innerHTML = `
                    <span class="erro">❌ Erro na conexão</span><br><br>
                    ${erro.message}
                `;
            }
        }
    </script>
</body>
</html>
