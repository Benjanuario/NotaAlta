<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NotaAlta • Simulador de Avaliação - Ensino Secundário</title>
    <meta name="theme-color" content="#0a0a2e">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #FF6B35;
            --primary-dark: #E55A2B;
            --bg-deep: #060614;
            --bg-space: #0a0a2e;
            --bg-mid: #0d0d3d;
            --bg-light: #101045;
            --text: #f1f5f9;
            --text-secondary: #b0b0d0;
            --glass: rgba(10, 10, 46, 0.7);
            --glass-border: rgba(255, 107, 53, 0.15);
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #060614 0%, #0a0a1e 30%, #0d0d2b 60%, #0f0f33 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1, h2, h3 { font-family: 'Poppins', sans-serif; font-weight: 700; }

        .header {
            background: linear-gradient(180deg, #0a0a2e 0%, #0d0d3d 50%, #101045 100%);
            padding: 14px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 107, 53, 0.15);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .header-content {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }

        .back-btn {
            width: 40px; height: 40px; border-radius: 12px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s; text-decoration: none;
        }

        .back-btn:hover { background: rgba(255,107,53,0.08); border-color: #FF6B35; }

        .header-title h1 { font-size: 1rem; font-weight: 800; color: #fff; }

        .header-badge {
            background: rgba(255,107,53,0.08); border: 1px solid rgba(255,107,53,0.2);
            padding: 6px 14px; border-radius: 30px; font-size: 0.7rem;
            font-weight: 700; color: #FF8C5A; display: flex; align-items: center; gap: 6px;
        }

        .main-container { max-width: 900px; margin: 0 auto; padding: 20px 16px 50px; }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 18px; padding: 28px 24px;
            border: 1px solid var(--glass-border); box-shadow: var(--shadow);
            margin-bottom: 20px; position: relative; overflow: hidden;
        }

        .glass-card::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 4px;
            background: linear-gradient(90deg, #FF6B35, #FF8C5A);
        }

        .section-title {
            font-size: 1.15rem; font-weight: 800; margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
            background: linear-gradient(135deg, #fff, #FF6B35);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }

        .section-title i { color: #FF6B35; font-size: 1.3rem; }

        .form-group { margin-bottom: 18px; }

        .form-label {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.85rem; font-weight: 700; margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .form-label i { color: #FF6B35; font-size: 1rem; }

        .form-input, .form-select {
            width: 100%; padding: 12px 16px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; color: #fff; font-size: 0.95rem;
            font-family: 'Inter', sans-serif; transition: all 0.3s;
        }

        .form-input:focus, .form-select:focus {
            outline: none; border-color: #FF6B35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .form-select option { background: #0d0d3d; color: #fff; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        .btn {
            padding: 13px 24px; border-radius: 50px; font-weight: 700;
            font-size: 0.95rem; cursor: pointer; border: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 10px; width: 100%;
            justify-content: center; font-family: 'Poppins', sans-serif;
            position: relative; overflow: hidden;
        }

        .btn::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before { left: 100%; }

        .btn-primary {
            background: linear-gradient(135deg, #FF6B35, #E55A2B); color: #fff;
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.25);
        }

        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(255, 107, 53, 0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-outline {
            background: transparent; border: 2px solid #FF6B35; color: #FF6B35;
        }

        .btn-outline:hover { background: rgba(255, 107, 53, 0.08); transform: translateY(-3px); }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669); color: #fff;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.25);
        }

        /* Timer */
        .timer-bar {
            display: none; background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 16px; padding: 14px 20px; margin-bottom: 20px;
            border: 1px solid rgba(245, 158, 11, 0.3); text-align: center;
            font-size: 1.2rem; font-weight: 700; animation: fadeInUp 0.4s ease;
            position: sticky; top: 80px; z-index: 50;
        }

        .timer-bar.active { display: flex; align-items: center; justify-content: center; gap: 10px; }

        .timer-bar i { color: #f59e0b; }

        .timer-value { color: #f59e0b; font-size: 1.5rem; font-weight: 900; font-family: 'Poppins', sans-serif; }

        .timer-urgent { color: #ef4444 !important; animation: pulse 0.8s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .score-bar {
            display: none; background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 16px; padding: 16px 22px; margin-bottom: 20px;
            border: 1px solid rgba(16, 185, 129, 0.25); text-align: center;
            font-size: 1.1rem; font-weight: 600; animation: fadeInUp 0.4s ease;
        }

        .score-bar.active { display: block; }
        .score-bar i { color: #10b981; margin-right: 6px; }
        .score-value { color: #10b981; font-size: 1.3rem; font-weight: 800; }

        .loading-container {
            display: none; text-align: center; padding: 40px 20px; animation: fadeInUp 0.4s ease;
        }

        .loading-container.active { display: block; }

        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.08); border-top: 4px solid #FF6B35;
            border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 18px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { color: var(--text-secondary); font-size: 0.95rem; }
        .loading-text i { color: #FF6B35; margin-right: 6px; }

        .question-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 18px; padding: 24px; margin-bottom: 18px;
            border: 1px solid var(--glass-border);
            transition: all 0.4s; animation: fadeInUp 0.5s ease forwards;
        }

        .question-card.answered { border-color: rgba(16, 185, 129, 0.3); }
        .question-number {
            font-size: 0.75rem; color: #64748b; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 10px; font-weight: 600;
        }

        .question-text { font-size: 1.1rem; font-weight: 500; margin-bottom: 18px; line-height: 1.7; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn-option {
            padding: 14px 16px; border-radius: 12px; font-weight: 600;
            font-size: 0.9rem; cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03); color: var(--text);
            transition: all 0.3s; font-family: 'Inter', sans-serif;
            text-align: left; display: flex; align-items: center; gap: 10px;
        }

        .btn-option .option-letter {
            width: 30px; height: 30px; border-radius: 8px;
            background: rgba(255,107,53,0.15); display: flex;
            align-items: center; justify-content: center;
            font-weight: 800; font-size: 0.85rem; color: #FF8C5A; flex-shrink: 0;
        }

        .btn-option:hover:not(:disabled) {
            border-color: #FF6B35; background: rgba(255, 107, 53, 0.06);
            transform: translateY(-2px);
        }

        .btn-option.selected {
            border-color: #FF6B35; background: rgba(255, 107, 53, 0.15); color: #FF8C5A;
        }

        .btn-option.selected .option-letter {
            background: rgba(255,107,53,0.3); color: #FF6B35;
        }

        .final-result {
            display: none; background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 18px; padding: 35px 24px; text-align: center;
            border: 1px solid rgba(255, 107, 53, 0.2); animation: fadeInUp 0.5s ease;
        }

        .final-result.active { display: block; }

        .trophy-icon { font-size: 4rem; color: #f59e0b; margin-bottom: 15px; animation: bounce 1s ease infinite; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .final-score {
            font-size: 4rem; font-weight: 900;
            background: linear-gradient(135deg, #10b981, #34d399);
            -webkit-background-clip: text; background-clip: text;
            color: transparent; margin: 15px 0; font-family: 'Poppins', sans-serif;
        }

        .final-message { color: var(--text-secondary); font-size: 1rem; margin-bottom: 20px; }

        .saved-badge {
            display: none; background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 12px;
            padding: 10px 16px; margin-bottom: 15px; font-size: 0.85rem;
            color: #10b981; text-align: center;
        }

        .saved-badge.show { display: block; }

        .btn-resume {
            display: none; width: 100%; margin-top: 12px;
        }

        .btn-resume.show { display: flex; }

        .toast {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: #101045; border: 1px solid #10b981; color: #fff;
            padding: 12px 22px; border-radius: 40px; font-weight: 600;
            font-size: 0.85rem; z-index: 1000; transition: transform 0.4s;
            display: flex; align-items: center; gap: 8px;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .options-grid { grid-template-columns: 1fr; }
            .header-title h1 { font-size: 0.85rem; }
            .final-score { font-size: 3rem; }
            .timer-bar { top: 70px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-content">
        <div class="header-left">
            <a href="home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <div class="header-title"><h1>Simulador de Avaliação • Ensino Secundário</h1></div>
        </div>
        <div class="header-badge"><i class="fas fa-graduation-cap"></i> 8ª - 12ª Classe</div>
    </div>
</header>

<main class="main-container">
    
    <div class="glass-card" id="configCard">
        <div class="section-title"><i class="fas fa-sliders-h"></i> Configurar Simulado</div>
        
        <div class="saved-badge" id="savedBadge">
            <i class="fas fa-save"></i> Tens uma prova guardada! O tempo restante é de <strong id="savedTimeDisplay">--</strong>.
        </div>
        
        <button class="btn btn-outline btn-resume" id="btnResume" onclick="retomarProva()">
            <i class="fas fa-play"></i> Retomar Prova Guardada
        </button>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label"><i class="fas fa-book"></i> Disciplina</label>
                <input type="text" id="disciplina" class="form-input" placeholder="Ex: Matemática, Física...">
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-layer-group"></i> Classe</label>
                <select id="classe" class="form-select">
                    <option value="">Selecione a classe</option>
                    <option value="8ª Classe">8ª Classe</option>
                    <option value="9ª Classe">9ª Classe</option>
                    <option value="10ª Classe">10ª Classe</option>
                    <option value="11ª Classe">11ª Classe</option>
                    <option value="12ª Classe">12ª Classe</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label"><i class="fas fa-tags"></i> Temas (separados por vírgula)</label>
            <input type="text" id="temas" class="form-input" placeholder="Ex: Equações do 1º grau, Inequações, Funções">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label"><i class="fas fa-hashtag"></i> Nº de Perguntas (20-30)</label>
                <input type="number" id="quantidade" class="form-input" min="20" max="30" value="20">
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-clock"></i> Tempo (minutos, máx. 60)</label>
                <input type="number" id="tempoProva" class="form-input" min="10" max="60" value="30">
            </div>
        </div>
        
        <button class="btn btn-primary" id="btnGerar" onclick="iniciarProva()">
            <i class="fas fa-play-circle"></i> Iniciar Simulado
        </button>
    </div>

    <div class="loading-container" id="loadingContainer">
        <div class="spinner"></div>
        <p class="loading-text"><i class="fas fa-robot"></i> IA a gerar a prova...</p>
    </div>

    <div class="timer-bar" id="timerBar">
        <i class="fas fa-hourglass-half"></i> Tempo Restante: <span class="timer-value" id="timerDisplay">--:--</span>
    </div>

    <div class="score-bar" id="scoreBar">
        <i class="fas fa-check-circle"></i> Respondidas: <span class="score-value" id="respondidas">0</span> / <span id="totalPerguntas">0</span>
    </div>

    <div id="questionsContainer"></div>

    <div style="display: flex; gap: 12px; margin-bottom: 20px;" id="actionButtons">
        <button class="btn btn-outline" id="btnSalvar" onclick="salvarProva()" style="display:none;">
            <i class="fas fa-save"></i> Guardar Prova
        </button>
        <button class="btn btn-primary" id="btnFinalizar" onclick="finalizarProva()" style="display:none;">
            <i class="fas fa-check-circle"></i> Finalizar Prova
        </button>
    </div>

    <div class="final-result" id="finalResult">
        <div class="trophy-icon"><i class="fas fa-trophy"></i></div>
        <h2>Resultado Final</h2>
        <div class="final-score" id="finalScoreDisplay">0</div>
        <p style="color:#94a3b8;">valores (máximo 20 valores)</p>
        <p class="final-message" id="finalMessage"></p>
        <div id="resultadoDetalhado" style="text-align:left; margin-top:15px;"></div>
        <button class="btn btn-outline" onclick="novaProva()" style="margin-top:15px;">
            <i class="fas fa-redo-alt"></i> Novo Simulado
        </button>
    </div>

</main>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMessage"></span></div>

<script>
const GROQ_API_KEY = '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';
const GROQ_API_URL = 'https://api.groq.com/openai/v1/chat/completions';
const GROQ_MODEL = 'llama-3.1-8b-instant';
const STORAGE_KEY = 'notaalta_esecsa_prova';

let perguntas = [];
let respostasUsuario = {};
let tempoTotal = 0;
let tempoRestante = 0;
let timerInterval = null;
let provaIniciada = false;
let notaFinal = 0;

// ============================================
// VERIFICAR PROVA SALVA AO CARREGAR
// ============================================
window.addEventListener('DOMContentLoaded', () => {
    const provaSalva = localStorage.getItem(STORAGE_KEY);
    if (provaSalva) {
        try {
            const dados = JSON.parse(provaSalva);
            if (dados.perguntas && dados.tempoRestante > 0) {
                document.getElementById('savedBadge').classList.add('show');
                document.getElementById('btnResume').classList.add('show');
                document.getElementById('savedTimeDisplay').textContent = formatarTempo(dados.tempoRestante);
            }
        } catch(e) {
            localStorage.removeItem(STORAGE_KEY);
        }
    }
});

// ============================================
// INICIAR PROVA
// ============================================
async function iniciarProva() {
    const disciplina = document.getElementById('disciplina').value.trim();
    const classe = document.getElementById('classe').value;
    const temas = document.getElementById('temas').value.trim();
    const quantidade = parseInt(document.getElementById('quantidade').value);
    const tempoProva = parseInt(document.getElementById('tempoProva').value);

    if (!disciplina) { showToast('Insira a disciplina!', 'warning'); return; }
    if (!classe) { showToast('Selecione a classe!', 'warning'); return; }
    if (!temas) { showToast('Insira os temas!', 'warning'); return; }
    if (quantidade < 20 || quantidade > 30) { showToast('Nº de perguntas entre 20 e 30!', 'warning'); return; }
    if (tempoProva < 10 || tempoProva > 60) { showToast('Tempo entre 10 e 60 minutos!', 'warning'); return; }

    tempoTotal = tempoProva * 60;
    tempoRestante = tempoTotal;
    respostasUsuario = {};
    provaIniciada = true;

    document.getElementById('configCard').style.display = 'none';
    document.getElementById('loadingContainer').classList.add('active');
    document.getElementById('savedBadge').classList.remove('show');
    document.getElementById('btnResume').classList.remove('show');

    try {
        perguntas = await gerarPerguntas(disciplina, classe, temas, quantidade);
        
        document.getElementById('loadingContainer').classList.remove('active');
        document.getElementById('timerBar').classList.add('active');
        document.getElementById('scoreBar').classList.add('active');
        document.getElementById('totalPerguntas').textContent = quantidade;
        document.getElementById('btnSalvar').style.display = 'flex';
        document.getElementById('btnFinalizar').style.display = 'flex';
        
        renderizarPerguntas();
        iniciarTimer();
        salvarEstado();
        
        showToast('Prova iniciada! Boa sorte!', 'success');
    } catch(erro) {
        document.getElementById('loadingContainer').classList.remove('active');
        document.getElementById('configCard').style.display = 'block';
        showToast('Erro: ' + erro.message, 'error');
    }
}

// ============================================
// GERAR PERGUNTAS COM IA
// ============================================
async function gerarPerguntas(disciplina, classe, temas, quantidade) {
    const prompt = `Gere exatamente ${quantidade} perguntas de múltipla escolha para uma avaliação de ${disciplina} da ${classe} do Ensino Secundário de Moçambique.

Temas: ${temas}

REGRAS:
1. Retorne APENAS array JSON puro
2. Cada objeto: "pergunta", "opcoes" (array 4 strings), "correta" (resposta exata)
3. Perguntas adequadas ao nível da ${classe}
4. Use português de Moçambique
5. Nível de dificuldade variado (fácil, médio, difícil)

EXEMPLO: [{"pergunta":"...","opcoes":["A","B","C","D"],"correta":"B"}]`;

    const response = await fetch(GROQ_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
        body: JSON.stringify({
            model: GROQ_MODEL,
            messages: [
                { role: 'system', content: 'És um professor moçambicano. Gera avaliações em JSON puro, sem markdown.' },
                { role: 'user', content: prompt }
            ],
            temperature: 0.7, max_tokens: 4000
        })
    });

    if (!response.ok) throw new Error(`API erro ${response.status}`);
    
    const data = await response.json();
    let conteudo = data.choices[0].message.content.replace(/```json/g,'').replace(/```/g,'').trim();
    const match = conteudo.match(/\[[\s\S]*\]/);
    if (!match) throw new Error('JSON inválido');
    
    return JSON.parse(match[0]);
}

// ============================================
// RENDERIZAR PERGUNTAS
// ============================================
function renderizarPerguntas() {
    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';
    const LETRAS = ['A','B','C','D'];

    perguntas.forEach((p, index) => {
        const selecionada = respostasUsuario[index];
        const card = document.createElement('div');
        card.className = 'question-card' + (selecionada !== undefined ? ' answered' : '');
        card.id = `q-${index}`;
        
        let opcoesHTML = p.opcoes.map((op, i) => `
            <button class="btn-option${selecionada === i ? ' selected' : ''}" 
                    id="btn-${index}-${i}" 
                    onclick="selecionarResposta(${index}, ${i})">
                <span class="option-letter">${LETRAS[i]}</span>
                <span>${op}</span>
            </button>
        `).join('');

        card.innerHTML = `
            <div class="question-number">Pergunta ${index+1} de ${perguntas.length}</div>
            <div class="question-text">${p.pergunta}</div>
            <div class="options-grid">${opcoesHTML}</div>
        `;
        container.appendChild(card);
    });
    
    atualizarContador();
    container.scrollIntoView({ behavior: 'smooth' });
}

// ============================================
// SELECIONAR RESPOSTA
// ============================================
function selecionarResposta(index, opcaoIndex) {
    if (!provaIniciada) return;
    
    respostasUsuario[index] = opcaoIndex;
    
    // Atualizar visual
    const card = document.getElementById(`q-${index}`);
    card.classList.add('answered');
    
    for(let i=0; i<4; i++) {
        const btn = document.getElementById(`btn-${index}-${i}`);
        btn.classList.remove('selected');
        if(i === opcaoIndex) btn.classList.add('selected');
    }
    
    atualizarContador();
    salvarEstado();
}

// ============================================
// ATUALIZAR CONTADOR
// ============================================
function atualizarContador() {
    const respondidas = Object.keys(respostasUsuario).length;
    document.getElementById('respondidas').textContent = respondidas;
}

// ============================================
// TIMER
// ============================================
function iniciarTimer() {
    clearInterval(timerInterval);
    atualizarTimerDisplay();
    
    timerInterval = setInterval(() => {
        tempoRestante--;
        atualizarTimerDisplay();
        salvarEstado();
        
        if (tempoRestante <= 0) {
            clearInterval(timerInterval);
            finalizarProva(true);
        }
    }, 1000);
}

function atualizarTimerDisplay() {
    const display = document.getElementById('timerDisplay');
    display.textContent = formatarTempo(tempoRestante);
    
    if (tempoRestante <= 300) {
        display.classList.add('timer-urgent');
    } else {
        display.classList.remove('timer-urgent');
    }
}

function formatarTempo(segundos) {
    const min = Math.floor(segundos / 60);
    const seg = segundos % 60;
    return `${min.toString().padStart(2,'0')}:${seg.toString().padStart(2,'0')}`;
}

// ============================================
// SALVAR ESTADO
// ============================================
function salvarEstado() {
    const estado = {
        perguntas, respostasUsuario, tempoRestante, tempoTotal,
        disciplina: document.getElementById('disciplina').value.trim(),
        classe: document.getElementById('classe').value,
        temas: document.getElementById('temas').value.trim(),
        quantidade: perguntas.length,
        timestamp: Date.now()
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(estado));
}

// ============================================
// RETOMAR PROVA
// ============================================
function retomarProva() {
    const dados = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!dados || dados.tempoRestante <= 0) {
        localStorage.removeItem(STORAGE_KEY);
        showToast('Prova expirada!', 'warning');
        return;
    }

    perguntas = dados.perguntas;
    respostasUsuario = dados.respostasUsuario || {};
    tempoRestante = dados.tempoRestante;
    tempoTotal = dados.tempoTotal;
    provaIniciada = true;

    document.getElementById('disciplina').value = dados.disciplina;
    document.getElementById('classe').value = dados.classe;
    document.getElementById('temas').value = dados.temas;
    document.getElementById('quantidade').value = dados.quantidade;

    document.getElementById('configCard').style.display = 'none';
    document.getElementById('savedBadge').classList.remove('show');
    document.getElementById('btnResume').classList.remove('show');
    document.getElementById('timerBar').classList.add('active');
    document.getElementById('scoreBar').classList.add('active');
    document.getElementById('totalPerguntas').textContent = perguntas.length;
    document.getElementById('btnSalvar').style.display = 'flex';
    document.getElementById('btnFinalizar').style.display = 'flex';
    document.getElementById('finalResult').classList.remove('active');

    renderizarPerguntas();
    iniciarTimer();
    showToast('Prova retomada!', 'success');
}

// ============================================
// SALVAR PROVA MANUALMENTE
// ============================================
function salvarProva() {
    salvarEstado();
    showToast('Prova guardada com sucesso!', 'success');
}

// ============================================
// FINALIZAR PROVA
// ============================================
function finalizarProva(tempoEsgotado = false) {
    provaIniciada = false;
    clearInterval(timerInterval);
    localStorage.removeItem(STORAGE_KEY);

    document.getElementById('timerBar').classList.remove('active');
    document.getElementById('scoreBar').classList.remove('active');
    document.getElementById('questionsContainer').innerHTML = '';
    document.getElementById('btnSalvar').style.display = 'none';
    document.getElementById('btnFinalizar').style.display = 'none';

    const total = perguntas.length;
    let acertos = 0;
    const resultadoDetalhado = [];

    perguntas.forEach((p, index) => {
        const respostaUser = respostasUsuario[index];
        const correta = p.opcoes.indexOf(p.correta);
        const acertou = respostaUser === correta;
        if (acertou) acertos++;
        
        resultadoDetalhado.push({
            pergunta: p.pergunta,
            suaResposta: respostaUser !== undefined ? p.opcoes[respostaUser] : 'Não respondida',
            correta: p.correta,
            acertou
        });
    });

    // Cálculo da nota
    if (total === 20) {
        notaFinal = acertos; // 1 valor por pergunta
    } else if (total === 30) {
        notaFinal = (acertos * 0.66);
        notaFinal = Math.round(notaFinal * 100) / 100;
    } else {
        notaFinal = (acertos / total) * 20;
        notaFinal = Math.round(notaFinal * 100) / 100;
    }

    document.getElementById('finalScoreDisplay').textContent = notaFinal.toFixed(2);
    
    const porcentagem = (acertos/total)*100;
    let mensagem = '';
    if (porcentagem >= 90) mensagem = '🏆 Excelente! Resultado brilhante!';
    else if (porcentagem >= 70) mensagem = '👏 Bom trabalho! Continua a estudar!';
    else if (porcentagem >= 50) mensagem = '📚 Razoável. Podes melhorar!';
    else mensagem = '📖 Precisa de mais estudo. Não desistas!';

    if (tempoEsgotado) mensagem = '⏰ Tempo esgotado! ' + mensagem;
    
    document.getElementById('finalMessage').textContent = mensagem;

    // Resultado detalhado
    const detalheDiv = document.getElementById('resultadoDetalhado');
    detalheDiv.innerHTML = `<h3 style="margin-bottom:12px;color:#FF8C5A;">Resumo: ${acertos}/${total} correctas</h3>`;
    resultadoDetalhado.forEach((r, i) => {
        detalheDiv.innerHTML += `
            <div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.85rem;">
                <strong>${i+1}.</strong> ${r.pergunta.substring(0,80)}... 
                <span style="color:${r.acertou ? '#10b981' : '#ef4444'}">
                    ${r.acertou ? '✓' : '✗'}
                </span>
            </div>`;
    });

    document.getElementById('finalResult').classList.add('active');
    document.getElementById('finalResult').scrollIntoView({ behavior: 'smooth' });
}

// ============================================
// NOVA PROVA
// ============================================
function novaProva() {
    localStorage.removeItem(STORAGE_KEY);
    perguntas = [];
    respostasUsuario = {};
    notaFinal = 0;
    provaIniciada = false;
    clearInterval(timerInterval);
    
    document.getElementById('configCard').style.display = 'block';
    document.getElementById('finalResult').classList.remove('active');
    document.getElementById('savedBadge').classList.remove('show');
    document.getElementById('btnResume').classList.remove('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================
// TOAST
// ============================================
function showToast(message, type='success') {
    const toast = document.getElementById('toast');
    const icon = toast.querySelector('i');
    const msg = document.getElementById('toastMessage');
    
    if(type==='error'){icon.className='fas fa-exclamation-circle';toast.style.borderColor='#ef4444';icon.style.color='#ef4444';}
    else if(type==='warning'){icon.className='fas fa-exclamation-triangle';toast.style.borderColor='#f59e0b';icon.style.color='#f59e0b';}
    else {icon.className='fas fa-check-circle';toast.style.borderColor='#10b981';icon.style.color='#10b981';}
    
    msg.textContent=message;
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),3500);
}
</script>
